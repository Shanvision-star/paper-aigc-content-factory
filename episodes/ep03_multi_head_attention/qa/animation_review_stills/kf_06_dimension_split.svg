        <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#0F172A" flood-opacity="0.11"/>
      </filter>
      <marker id="arrow-q" viewBox="0 0 12 12" refX="12" refY="6" markerWidth="12" markerHeight="12" markerUnits="userSpaceOnUse" orient="auto">
    <path d="M0 0L12 6L0 12Z" fill="#4C78FF"/>
  </marker>
      <marker id="arrow-k" viewBox="0 0 12 12" refX="12" refY="6" markerWidth="12" markerHeight="12" markerUnits="userSpaceOnUse" orient="auto">
    <path d="M0 0L12 6L0 12Z" fill="#F58518"/>
  </marker>
      <marker id="arrow-v" viewBox="0 0 12 12" refX="12" refY="6" markerWidth="12" markerHeight="12" markerUnits="userSpaceOnUse" orient="auto">
    <path d="M0 0L12 6L0 12Z" fill="#54A24B"/>
  </marker>
      <marker id="arrow-muted" viewBox="0 0 12 12" refX="12" refY="6" markerWidth="12" markerHeight="12" markerUnits="userSpaceOnUse" orient="auto">
    <path d="M0 0L12 6L0 12Z" fill="#94A3B8"/>
  </marker>
      <marker id="arrow-wo" viewBox="0 0 12 12" refX="12" refY="6" markerWidth="12" markerHeight="12" markerUnits="userSpaceOnUse" orient="auto">
    <path d="M0 0L12 6L0 12Z" fill="#E45756"/>
  </marker>
    </defs>
    <rect width="1080" height="1920" fill="#F7F7F5"/>
    <rect width="1080" height="1920" fill="url(#grid)" opacity="0.76"/>
    <rect x="0" y="0" width="18" height="1920" fill="#F4ECF7"/>
    <rect x="18" y="0" width="4" height="1920" fill="#E2E8F0"/>
    <rect x="42" y="48" width="996" height="1812" rx="34" fill="#FFFFFF" opacity="0.20" stroke="#E2E8F0"/>
    <g opacity="0.18">
      <circle cx="1000" cy="210" r="36" fill="#F4ECF7"/>
      <circle cx="70" cy="1680" r="28" fill="#EFF6FF"/>
      <path d="M78 1760H1002" stroke="#E2E8F0" stroke-width="2" stroke-dasharray="10 14"/>
    </g>
    <rect x="305" y="66" width="470" height="70" rx="16" fill="#F4ECF7" stroke="#B279A2" stroke-opacity="0.5"/>
    <text x="540" y="112" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="31" font-weight="950" fill="#111827">第3集 · 为什么一个 Head 不够</text>
    <text x="64" y="222" font-family="Microsoft YaHei, Arial, sans-serif" font-size="58" font-weight="950" fill="#111827">
    <tspan x="64" dy="0">头变多，计算不是无脑暴涨</tspan>
  </text>
    <text x="70" y="360" font-family="Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="850" fill="#475569">
    <tspan x="70" dy="0">原论文基础配置里 h 等于 8；每个 head 的向量维度按模型宽度</tspan>
<tspan x="70" dy="38">拆分。</tspan>
  </text>
    <g>
    <rect x="102" y="534" width="900" height="960" rx="24" fill="#E2E8F0" opacity="0.45"/>
    <rect x="96" y="527" width="900" height="960" rx="24" fill="#F8FAFC" opacity="0.70" stroke="#E2E8F0"/>
    <rect x="90" y="520" width="900" height="960" rx="24" fill="#FFFFFF" stroke="#E2E8F0" filter="url(#shadow)"/>
    <path d="M118 542H962" stroke="#F4ECF7" stroke-width="6" stroke-linecap="round" opacity="0.85"/>
  </g>
    <image x="90" y="620" width="900" height="235" href="data:image/svg+xml;base64,"/>
    <rect x="145" y="930" width="790" height="235" rx="24" fill="#F8FAFC" stroke="#E2E8F0"/>
    <text x="540" y="988" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="31" font-weight="950" fill="#111827">论文 base 配置里的数字例子</text>
    <g>
    <rect x="178" y="1038" width="208" height="62" rx="18" fill="#FFFFFF" stroke="#4C78FF" stroke-width="3"/>
    <text x="282" y="1079" text-anchor="middle" font-family="Georgia, serif" font-size="28" font-weight="900" fill="#4C78FF">d<tspan baseline-shift="sub" font-size="17">model</tspan> = 512</text>
  </g>
    <g>
    <rect x="450" y="1038" width="120" height="62" rx="18" fill="#FFFFFF" stroke="#F58518" stroke-width="3"/>
    <text x="510" y="1079" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="27" font-weight="900" fill="#F58518">h=8</text>
  </g>
    <g>
    <rect x="654" y="1038" width="190" height="62" rx="18" fill="#FFFFFF" stroke="#54A24B" stroke-width="3"/>
    <text x="749" y="1079" text-anchor="middle" font-family="Georgia, serif" font-size="28" font-weight="900" fill="#54A24B">d<tspan baseline-shift="sub" font-size="17">k</tspan> = 64</text>
  </g>
    <path d="M390 1068L438 1068" stroke="#94A3B8" stroke-width="5" stroke-linecap="round" fill="none" marker-end="url(#arrow-muted)"/>
    <path d="M572 1068L642 1068" stroke="#94A3B8" stroke-width="5" stroke-linecap="round" fill="none" marker-end="url(#arrow-muted)"/>
    <text x="540" y="1130" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="26" font-weight="900" fill="#475569">512 ÷ 8 = 64，每个 head 只处理一部分维度</text>
    <rect x="145" y="1238" width="790" height="174" rx="24" fill="#FFF7ED" stroke="#F58518" stroke-opacity="0.3"/>
    <text x="180" y="1290" text-anchor="start" font-family="Microsoft YaHei, Arial, sans-serif" font-size="25" font-weight="950" fill="#7C2D12">Conclusion</text>
    <text x="180" y="1334" text-anchor="start" font-family="Microsoft YaHei, Arial, sans-serif" font-size="23" font-weight="900" fill="#7C2D12">heads（注意力头）不是把 compute（计算）简单乘以 8，</text>
    <text x="180" y="1372" text-anchor="start" font-family="Microsoft YaHei, Arial, sans-serif" font-size="23" font-weight="900" fill="#7C2D12">而是在相近成本下换来</text>
    <text x="180" y="1406" text-anchor="start" font-family="Microsoft YaHei, Arial, sans-serif" font-size="23" font-weight="900" fill="#7C2D12">representation decomposition（表示分解）。</text>
    <g>
    <rect x="564" y="1500" width="420" height="50" rx="14" fill="#FFFFFF" stroke="#CBD5E1"/>
    <text x="774" y="1533" text-anchor="middle" font-family="Microsoft YaHei, Arial, sans-serif" font-size="21" font-weight="850" fill="#64748B">Source: Attention Is All You Need</text>
  </g>
  </svg>