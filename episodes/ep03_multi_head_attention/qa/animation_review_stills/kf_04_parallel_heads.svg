    <text x="64" y="222" font-family="Microsoft YaHei, Arial, sans-serif" font-size="58" font-weight="950" fill="#111827">
    <tspan x="64" dy="0">多个 Head 并行，不是手写专家</tspan>
  </text>
    <text x="70" y="360" font-family="Microsoft YaHei, Arial, sans-serif" font-size="28" font-weight="850" fill="#475569">
    <tspan x="70" dy="0">每个 head 生成自己的注意力模式，但这些模式来自训练，不是</tspan>
<tspan x="70" dy="38">程序员手动分工。</tspan>
  </text>
