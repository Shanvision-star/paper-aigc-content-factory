<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="620" viewBox="0 0 1600 620" role="img" aria-label="Harvard Annotated Transformer attention code">
  <rect width="1600" height="620" rx="34" fill="#0F172A"/>
  <text x="70" y="76" font-family="Arial, Microsoft YaHei, sans-serif" font-size="32" font-weight="800" fill="#CBD5E1">Harvard Annotated Transformer attention()</text>
  <g font-family="Consolas, Menlo, monospace" font-size="38">
    <text x="78" y="154" fill="#93C5FD">d_k</text><text x="165" y="154" fill="#E2E8F0"> = query.size(-1)</text>
    <text x="78" y="226" fill="#FBBF24">scores</text><text x="218" y="226" fill="#E2E8F0"> = torch.matmul(query, key.transpose(-2, -1)) / math.sqrt(d_k)</text>
    <text x="78" y="298" fill="#C084FC">p_attn</text><text x="220" y="298" fill="#E2E8F0"> = F.softmax(scores, dim=-1)</text>
    <text x="78" y="370" fill="#86EFAC">return</text><text x="220" y="370" fill="#E2E8F0"> torch.matmul(p_attn, value), p_attn</text>
  </g>
  <g font-family="Arial, Microsoft YaHei, sans-serif" font-size="28" font-weight="800">
    <rect x="80" y="452" width="300" height="74" rx="18" fill="#1E3A8A"/>
    <text x="116" y="500" fill="#DBEAFE">1 QK^T scores</text>
    <rect x="422" y="452" width="300" height="74" rx="18" fill="#713F12"/>
    <text x="458" y="500" fill="#FEF3C7">2 divide √(d_k)</text>
    <rect x="764" y="452" width="300" height="74" rx="18" fill="#581C87"/>
    <text x="800" y="500" fill="#F3E8FF">3 softmax row</text>
    <rect x="1106" y="452" width="360" height="74" rx="18" fill="#14532D"/>
    <text x="1142" y="500" fill="#DCFCE7">4 weighted V</text>
  </g>
</svg>
