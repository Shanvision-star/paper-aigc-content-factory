<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="900" viewBox="0 0 1500 900" role="img" aria-label="KV Cache engineering path">
  <rect width="1500" height="900" rx="36" fill="#FFFDF8"/>
  <text x="90" y="95" font-family="Arial, Microsoft YaHei, sans-serif" font-size="46" font-weight="900" fill="#1C1C1C">生成新 token 时：新的 Q 读取历史 K/V</text>
  <rect x="90" y="170" width="300" height="150" rx="24" fill="#EAF0FF" stroke="#4C78FF" stroke-width="4"/>
  <text x="240" y="240" font-family="Arial, Microsoft YaHei, sans-serif" font-size="42" font-weight="900" text-anchor="middle" fill="#4C78FF">new Q</text>
  <text x="240" y="286" font-family="Arial, Microsoft YaHei, sans-serif" font-size="26" font-weight="800" text-anchor="middle" fill="#1C1C1C">当前查询</text>
  <g stroke="#4C78FF" stroke-width="7" stroke-linecap="round" fill="none">
    <path d="M 390 245 C 520 230, 620 210, 750 205"/>
    <path d="M 390 245 C 520 310, 620 360, 750 380"/>
  </g>
  <g font-family="Arial, Microsoft YaHei, sans-serif" font-weight="900">
    <rect x="750" y="145" width="620" height="120" rx="22" fill="#FFF1E1" stroke="#F58518" stroke-width="4"/>
    <text x="795" y="220" font-size="38" fill="#F58518">cached K</text>
    <text x="1020" y="220" font-size="28" fill="#1C1C1C">历史 token 的索引投影</text>
    <rect x="750" y="320" width="620" height="120" rx="22" fill="#EAF7EA" stroke="#54A24B" stroke-width="4"/>
    <text x="795" y="395" font-size="38" fill="#54A24B">cached V</text>
    <text x="1020" y="395" font-size="28" fill="#1C1C1C">历史 token 的内容投影</text>
  </g>
  <g font-family="Arial, Microsoft YaHei, sans-serif" font-size="30" font-weight="900">
    <rect x="90" y="560" width="390" height="210" rx="26" fill="#EFF6FF" stroke="#4C78FF" stroke-width="3"/>
    <text x="125" y="625" fill="#2563EB">FlashAttention</text>
    <text x="125" y="680" fill="#1C1C1C">计算层：更快、更省显存</text>
    <rect x="555" y="560" width="390" height="210" rx="26" fill="#FFF7ED" stroke="#F58518" stroke-width="3"/>
    <text x="590" y="625" fill="#EA580C">GQA / MQA</text>
    <text x="590" y="680" fill="#1C1C1C">结构层：减少 K/V 成本</text>
    <rect x="1020" y="560" width="390" height="210" rx="26" fill="#F0FDF4" stroke="#54A24B" stroke-width="3"/>
    <text x="1055" y="625" fill="#16A34A">KV Cache</text>
    <text x="1055" y="680" fill="#1C1C1C">运行时：复用历史 K/V</text>
  </g>
</svg>
