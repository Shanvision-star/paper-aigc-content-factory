<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920">
  <defs>
    <style>
      .bg { fill: #0f172a; }
      .panel { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 3; }
      .muted { fill: #94a3b8; font-family: Arial, "Microsoft YaHei", sans-serif; }
      .text { fill: #f8fafc; font-family: Arial, "Microsoft YaHei", sans-serif; font-weight: 700; }
      .dark { fill: #0f172a; font-family: Arial, "Microsoft YaHei", sans-serif; font-weight: 700; }
      .small { font-size: 30px; }
      .medium { font-size: 44px; }
      .large { font-size: 64px; }
      .accent { fill: #f59e0b; }
      .blue { fill: #38bdf8; }
      .green { fill: #34d399; }
      .pink { fill: #fb7185; }
      .line { stroke: #38bdf8; stroke-width: 5; fill: none; stroke-linecap: round; }
      .softline { stroke: #94a3b8; stroke-width: 3; fill: none; stroke-linecap: round; opacity: .65; }
      .hotline { stroke: #f59e0b; stroke-width: 8; fill: none; stroke-linecap: round; }
      .token { fill: #1e293b; stroke: #38bdf8; stroke-width: 3; }
    </style>
  </defs>
  <rect class="bg" width="1080" height="1920"/>
  <text x="80" y="128" class="text large">Modern AI System Layers</text>
  <rect x="110" y="360" width="860" height="160" rx="30" class="panel"/>
    <text x="160" y="425" class="dark medium">模型结构层</text>
    <text x="160" y="485" class="dark large">Transformer</text>
<rect x="110" y="610" width="860" height="160" rx="30" class="panel"/>
    <text x="160" y="675" class="dark medium">模型/产品层</text>
    <text x="160" y="735" class="dark large">GPT · Claude · Sora-style</text>
<rect x="110" y="860" width="860" height="160" rx="30" class="panel"/>
    <text x="160" y="925" class="dark medium">编排层</text>
    <text x="160" y="985" class="dark large">Agent</text>
<rect x="110" y="1110" width="860" height="160" rx="30" class="panel"/>
    <text x="160" y="1175" class="dark medium">工具接口层</text>
    <text x="160" y="1235" class="dark large">MCP · Skills · Workflows</text><text x="120" y="1510" class="text medium">Agent 和 MCP 在模型之上，</text>
  <text x="120" y="1580" class="text medium">不是 Transformer 本体。</text>
  <text x="80" y="1830" class="muted small">EP01 · Attention Is All You Need · Formal Visual Asset</text>
</svg>
