<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920">
  <defs>
    <style>
      .bg { fill: #0f172a; }
      .panel { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 3; }
      .muted { fill: #94a3b8; font-family: Arial, "Microsoft YaHei", sans-serif; }
      .text { fill: #f8fafc; font-family: Arial, "Microsoft YaHei", sans-serif; font-weight: 700; }
      .dark { fill: #0f172a; font-family: Arial, "Microsoft YaHei", sans-serif; font-weight: 700; }
      .small { font-size: 30px; }
      .medium { font-size: 44px; }
      .large { font-size: 64px; }
      .accent { fill: #f59e0b; }
      .blue { fill: #38bdf8; }
      .green { fill: #34d399; }
      .pink { fill: #fb7185; }
      .line { stroke: #38bdf8; stroke-width: 5; fill: none; stroke-linecap: round; }
      .softline { stroke: #94a3b8; stroke-width: 3; fill: none; stroke-linecap: round; opacity: .65; }
      .hotline { stroke: #f59e0b; stroke-width: 8; fill: none; stroke-linecap: round; }
      .token { fill: #1e293b; stroke: #38bdf8; stroke-width: 3; }
    </style>
  </defs>
  <rect class="bg" width="1080" height="1920"/>
  <text x="80" y="128" class="text large">RNN = 排队传话</text>
  
  <rect x="390" y="260" rx="28" ry="28" width="300" height="92" class="token"/>
  <text x="540" y="320" text-anchor="middle" class="text medium">我</text>
<rect x="390" y="450" rx="28" ry="28" width="300" height="92" class="token"/>
  <text x="540" y="510" text-anchor="middle" class="text medium">看见</text>
<rect x="390" y="640" rx="28" ry="28" width="300" height="92" class="token"/>
  <text x="540" y="700" text-anchor="middle" class="text medium">一只</text>
<rect x="390" y="830" rx="28" ry="28" width="300" height="92" class="token"/>
  <text x="540" y="890" text-anchor="middle" class="text medium">猫</text>
<rect x="390" y="1020" rx="28" ry="28" width="300" height="92" class="token"/>
  <text x="540" y="1080" text-anchor="middle" class="text medium">它</text>
<rect x="390" y="1210" rx="28" ry="28" width="300" height="92" class="token"/>
  <text x="540" y="1270" text-anchor="middle" class="text medium">很快</text>
  <path class="line" d="M 540 352 L 540 450"/>
<path class="line" d="M 540 542 L 540 640"/>
<path class="line" d="M 540 732 L 540 830"/>
<path class="softline" d="M 540 922 L 540 1020"/>
<path class="softline" d="M 540 1112 L 540 1210"/>
  <text x="120" y="1540" class="text medium">句子越长，前面的信息越容易变弱。</text>
  <text x="120" y="1610" class="muted small">Feynman analogy: message passing in a queue.</text>
  <text x="80" y="1830" class="muted small">EP01 · Attention Is All You Need · Formal Visual Asset</text>
</svg>
