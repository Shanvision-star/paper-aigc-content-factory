<path class="hotline" d="M 260 940 L 820 940"/>
  <rect x="450" y="374" rx="28" ry="28" width="180" height="92" class="token"/>
  <text x="540" y="434" text-anchor="middle" class="text medium">我</text>
<rect x="170" y="574" rx="28" ry="28" width="180" height="92" class="token"/>
  <text x="260" y="634" text-anchor="middle" class="text medium">看见</text>
<rect x="730" y="574" rx="28" ry="28" width="180" height="92" class="token"/>
