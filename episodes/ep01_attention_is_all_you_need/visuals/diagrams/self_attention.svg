  <rect class="bg" width="1080" height="1920"/>
  <text x="80" y="128" class="text large">Self-Attention = 加权汇聚</text>
  
  <path class="softline" d="M 540 420 L 260 620"/>
<path class="softline" d="M 540 420 L 820 620"/>
