  <text x="700" y="440" font-family="Consolas, monospace" font-size="30" font-weight="800" text-anchor="middle" fill="#DBEAFE">Q_i</text>
  <text x="120" y="798" font-family="Arial, Microsoft YaHei, sans-serif" font-size="32" font-weight="800" fill="#1C1C1C">soft adjacency matrix: 每一层动态生成的加权关系</text>
