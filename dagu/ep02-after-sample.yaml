name: ai-paper-ep02-after-sample
group: AI Paper Content Factory
type: graph
retry_policy:
  limit: 0
description: >
  Continue EP02 production after representative F5-TTS samples have been
  human-approved. This workflow does not regenerate sample audio.

steps:
  - id: human_approval
    description: Verify seg_001, seg_010, and seg_014 sample approval before full generation.
    working_dir: C:/Users/Rome/Documents/Paper_every_day
    run: npm run audio:sample-review-gate:ep02

  - id: full_tts
    description: Generate EP02 F5-TTS audio one segment at a time after sample approval.
    working_dir: C:/Users/Rome/Documents/Paper_every_day
    run: npm run audio:f5-generate-full:ep02
    depends: human_approval

  - id: merge
    description: Merge generated EP02 scene audio with short natural pauses.
    working_dir: C:/Users/Rome/Documents/Paper_every_day
    run: npm run audio:f5-merge-segments:ep02
    depends: full_tts

  - id: apply_audio_timings
    description: Apply real segmented audio durations back to EP02 script, storyboard, captions source, and video timeline.
    working_dir: C:/Users/Rome/Documents/Paper_every_day
    run: npm run audio:apply-segment-timings:ep02
    depends: merge

  - id: audio_postprocess
    description: Denoise, limit, and normalize the generated EP02 voiceover before canonical import.
    working_dir: C:/Users/Rome/Documents/Paper_every_day
    run: npm run audio:postprocess:ep02 -- --input audio/voiceover.segmented.wav
    depends: apply_audio_timings

  - id: import_voiceover
    description: Import the postprocessed EP02 WAV into audio/voiceover.wav.
    working_dir: C:/Users/Rome/Documents/Paper_every_day
    run: npm run voiceover:import-postprocessed:ep02
    depends: audio_postprocess

  - id: captions
    description: Generate EP02 SRT/VTT captions from the real voiceover and segment timings.
    working_dir: C:/Users/Rome/Documents/Paper_every_day
    run: npm run captions:align:ep02
    depends: import_voiceover

  - id: render
    description: Render the EP02 1080x1920 HyperFrames MP4 draft and mux generated voiceover audio.
    working_dir: C:/Users/Rome/Documents/Paper_every_day
    run: npm run video:hyperframes-render-formal:ep02
    depends: captions

  - id: publish_pack
    description: Write EP02 platform publish pack for human review without posting.
    working_dir: C:/Users/Rome/Documents/Paper_every_day
    run: npm run publish:pack:ep02
    depends: render

  - id: quality_gate
    description: Recompute EP02 quality status and keep remaining runtime gaps explicit.
    working_dir: C:/Users/Rome/Documents/Paper_every_day
    run: npm run quality:gate:ep02
    depends: publish_pack

  - id: pipeline_map
    description: Refresh the EP02 visual input/output map.
    working_dir: C:/Users/Rome/Documents/Paper_every_day
    run: npm run pipeline:map:ep02
    depends: quality_gate

  - id: test
    description: Run deterministic Vitest contract tests.
    working_dir: C:/Users/Rome/Documents/Paper_every_day
    run: npm test
    depends: pipeline_map

  - id: typecheck
    description: Run TypeScript type checking.
    working_dir: C:/Users/Rome/Documents/Paper_every_day
    run: npm run typecheck
    depends: test

  - id: inspect_artifacts
    description: Print EP02 audio, render, and quality status.
    working_dir: C:/Users/Rome/Documents/Paper_every_day
    run: >
      node -e "const fs=require('fs');
      const safe=p=>fs.existsSync(p)?JSON.parse(fs.readFileSync(p,'utf8')):null;
      const base='./episodes/ep02_attention_qkv';
      const merge=safe(base+'/audio/f5_tts/segments/segmented_merge_report.json');
      const timing=safe(base+'/video_script/timing_report.json');
      const render=safe(base+'/renders/hyperframes_formal_status.json');
      const qa=safe(base+'/qa/qa_report.json');
      console.log(JSON.stringify({audio:merge?.status||'not_merged', audio_duration:merge?.duration_sec||null, timeline_duration:timing?.total_duration_sec||null, render:render?.status||'not_rendered', qa:qa?.status||'not_run', blocking_items:qa?.blocking_items||null}, null, 2));"
    depends: typecheck
